<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
        href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;700&display=swap"
        rel="stylesheet"
    />

    <title>Rating Component</title>
</head>

<body>
    <!-- MAIN LANDMARK -->
    <main class="main-content">

        <!-- RATING STATE -->
        <section id="rating-state">

            <div class="top-section">
                <figure class="img-circle-container">
                    <img
                        src="./images/icon-star.svg"
                        alt="Star icon"
                    />
                </figure>
            </div>

            <section class="rate-us">
                <h1>How did we do?</h1>

                <p>
                    Please let us know how we did with your support request.
                    All feedback is appreciated to help us improve our offering!
                </p>
            </section>

            <section
                class="rating-section"
                aria-label="Rating buttons"
            >
                <button type="button" class="rating-button">1</button>
                <button type="button" class="rating-button">2</button>
                <button type="button" class="rating-button">3</button>
                <button type="button" class="rating-button">4</button>
                <button type="button" class="rating-button">5</button>
            </section>

            <button
                type="button"
                class="submit-button"
            >
                Submit
            </button>
        </section>

        <section
            id="thank-you-state"
            class="hidden"
        >
            <div class="top-section-option-selected">

                <figure class="illustration-thank-you-container">
                    <img
                        src="./images/illustration-thank-you.svg"
                        alt="Thank you illustration"
                    />
                </figure>

                <h2 class="user-selection">
                    You selected 0 out of 5
                </h2>
            </div>

            <section class="thanks-section">
                <h1>Thank you!</h1>

                <p>
                    We appreciate you taking the time to give a rating.
                    If you ever need more support, don’t hesitate to get in touch!
                </p>
            </section>
        </section>

    </main>

    <script src="./scripts.js"></script>
</body>
</html>
